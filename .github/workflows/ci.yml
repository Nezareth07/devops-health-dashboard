name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 api/app.py \
            --max-line-length=100 \
            --ignore=E501,W503

      - name: Run tests with coverage
        run: |
          cd api && python3 -m pytest tests/test_app.py -v \
            --cov=app \
            --cov-report=term-missing

  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    # Solo hace push en push a main o develop — no en PRs
    # En PRs solo construye para verificar que la imagen buildea
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # ${{ secrets.X }} — así se usan los secrets en GitHub Actions
        # nunca se imprimen en los logs — GitHub los enmascara automáticamente

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-health-dashboard
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
        # metadata-action genera tags automáticamente según la rama y el commit
        # en main genera: latest, main, main-abc1234
        # en develop genera: develop, develop-abc1234

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
